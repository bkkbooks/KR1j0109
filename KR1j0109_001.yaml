body:
  text: 字統蒳香草顧野王玉篇草部齶口中齗齶廣韻入聲十九鐸齶字注衍水朝宗于海故從水行廣韻上聲二十八銑衍字注𪘓齒𪘓跌廣韻下平聲七歌𪘓字注蹶䟹跳踉貌廣韻入聲十七薛蹶字注卙會聚也昌汁切廣韻入聲二十六緝卙字注卌插糞杷廣韻入聲二十六緝卌字注瞙目不明玉篇目部鵼去紅切音空怪鳥廣韻上平聲一東鵼字注𪀠䳦小鳥廣韻上平聲十八諄𪀠字注𪄱鴹一足鳥舞則天下雨廣韻下平聲十陽鴹字注鴶鵴鴶巨乙翻郭忠恕佩觿𦔫耕也廣韻入聲二十四職𦔫字注箭箭者竹之別形大身小葉曰竹小身大葉曰箭箭竹主為矢因謂矢為箭太平御覽卷三百四十九橦本音同今借木橦字篇海木部棸姓也廣韻下平聲十八尤棸字注𣉘埃也又曰光也廣韻入聲二十五德𣉘字注填填顏府在北州廣韻下平聲一先填字注窳懶人不能自起瓜瓠在地不能自立故字從瓜又懶人恆在室中故從穴釋元應四分律音義𤷗腫滿悶而反裂也龍龕手鑑疒部偋廁也防正切廣韻去聲四十五徑偋字注便人有不善更之則安故從更從人集韻去聲三十三線便字注𣄴薄事有不善曰𣄴薄廣韻去聲四十一漾𣄴字注袾朱衣曰袾廣韻上平聲十虞袾字注規丈夫識用必合規矩故規從夫也廣韻上平聲五支規字注篇海夫部䪷勤作廣韻去聲五十候䪷字注嫠微畫也廣韻上平聲七之嫠字注硉音端宋庠國語補音卷二粗警防也鹿之性相背而食慮人獸之害也故從三鹿廣韻上平聲十一模粗字注燹野火也廣韻上聲二十七銑燹字注火也音銑廣韻去聲六至燹字注閦初六切衆也玉篇門部閦衆貌玉篇云同上摽擊也廣韻下平聲四宵摽字注摽合作𦭼符少切廣韻上聲三十小摽字注擽擊也廣韻入聲十九鐸擽字注㨑摵俗謂之捉頭集韻上平聲一東㨑字注𡠗至也廣韻入聲二十六緝𡠗字注矜僯也廣釋慧苑華嚴經音義上轂車也又山名亦姓廣韻上平聲十一模轂字注音枯鄭樵通志氏族略阺秦謂陵阪為阺也廣韻上平聲六脂阺字注
